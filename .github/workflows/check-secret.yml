name: Check VERCEL_TOKEN secret
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if VERCEL_TOKEN exists
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN is NOT set"
            exit 1
          else
            echo "✅ VERCEL_TOKEN is set (value hidden)"
          fi
