name: Check VERCEL_TOKEN secret
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check repository secrets
        run: |
          echo "Checking secrets availability..."
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN is NOT set as a repository secret"
            echo ""
            echo "To fix:"
            echo "1. Go to https://github.com/JohnDaWalka/Zao-Poker/settings/secrets/actions"
            echo "2. Click 'New repository secret' (NOT 'New environment secret')"
            echo "3. Name: VERCEL_TOKEN"
            echo "4. Value: your Vercel token"
            echo "5. Click 'Add secret'"
            exit 1
          else
            echo "✅ VERCEL_TOKEN is set"
            echo "Length: ${#VERCEL_TOKEN} characters"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
