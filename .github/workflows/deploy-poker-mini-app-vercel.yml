name: Deploy poker-mini-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "poker-mini-app/**"
      - ".github/workflows/deploy-poker-mini-app-vercel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-poker-mini-app-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        working-directory: poker-mini-app
        run: vercel link --yes --scope wecrypto --project poker-mini-app --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Pull Vercel environment info
        working-directory: poker-mini-app
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build project
        working-directory: poker-mini-app
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        working-directory: poker-mini-app
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
