name: Deploy poker-mini-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "poker-mini-app/**"
      - ".github/workflows/deploy-poker-mini-app-vercel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          # Project tokens (prj_*) are already scoped to a project.
          # Skip vercel link and deploy directly.
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
