name: Deploy poker-mini-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "poker-mini-app/**"
      - ".github/workflows/deploy-poker-mini-app-vercel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-poker-mini-app-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link and deploy to Vercel
        working-directory: poker-mini-app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Linking project..."
          vercel link --yes --scope wecrypto --project poker-mini-app --token "$VERCEL_TOKEN"
          echo "Pulling environment..."
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          echo "Building..."
          vercel build --prod --token "$VERCEL_TOKEN"
          echo "Deploying..."
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
