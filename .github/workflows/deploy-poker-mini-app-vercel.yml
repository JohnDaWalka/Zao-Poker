name: Deploy poker-mini-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "poker-mini-app/**"
      - ".github/workflows/deploy-poker-mini-app-vercel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: poker-mini-app/package-lock.json
      - name: Install dependencies
        run: |
          cd poker-mini-app
          npm ci
      - name: Build
        run: |
          cd poker-mini-app
          npm run build
      - name: Link Vercel Project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            mkdir -p poker-mini-app/.vercel
            echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > poker-mini-app/.vercel/project.json
            echo "Linked Vercel project: $VERCEL_PROJECT_ID"
          else
            echo "Warning: VERCEL_ORG_ID and VERCEL_PROJECT_ID not set. Deploy may fail if project is not linked."
          fi
      - name: Verify Vercel Token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel@37.0.0
          echo "Checking Vercel token..."
          vercel whoami --token "$VERCEL_TOKEN" || echo "Token verification failed"
          echo "Checking project access..."
          vercel project ls --token "$VERCEL_TOKEN" 2>&1 | head -20 || echo "Project listing failed"
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          cd poker-mini-app
          echo "Deploying with Vercel CLI (debug mode)..."
          vercel deploy --prod --yes --force --token "$VERCEL_TOKEN" -e TURSO_DATABASE_URL="$TURSO_DATABASE_URL" -e TURSO_AUTH_TOKEN="$TURSO_AUTH_TOKEN" --debug 2>&1 | tee deploy.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== DEPLOY FAILED ==="
            echo "Last 50 lines of output:"
            tail -n 50 deploy.log || true
            exit $EXIT_CODE
          fi
