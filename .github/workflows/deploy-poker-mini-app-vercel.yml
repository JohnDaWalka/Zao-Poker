name: Deploy poker-mini-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "poker-mini-app/**"
      - ".github/workflows/deploy-poker-mini-app-vercel.yml"
  workflow_dispatch:

# Prevent concurrent deployments - cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: poker-mini-app/package-lock.json
      - name: Install dependencies
        run: |
          cd poker-mini-app
          npm ci
      - name: Build
        run: |
          cd poker-mini-app
          npm run build
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ZAO_SECRET: ${{ secrets.ZAO_SECRET }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          cd poker-mini-app
          echo "Deploying to Vercel..."
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN" \
            -e TURSO_DATABASE_URL="$TURSO_DATABASE_URL" \
            -e TURSO_AUTH_TOKEN="$TURSO_AUTH_TOKEN" \
            -e ZAO_SECRET="$ZAO_SECRET" \
            -e NEYNAR_API_KEY="$NEYNAR_API_KEY" \
            2>&1 | tee deploy.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== DEPLOY FAILED ==="
            tail -n 50 deploy.log || true
            exit $EXIT_CODE
          fi
          echo "=== DEPLOY SUCCESS ==="
