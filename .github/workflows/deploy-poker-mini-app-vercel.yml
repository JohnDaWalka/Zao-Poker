name: Deploy poker-mini-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "poker-mini-app/**"
      - ".github/workflows/deploy-poker-mini-app-vercel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-poker-mini-app-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          echo "Step 1: Linking..."
          npx vercel link --yes --scope wecrypto --project poker-mini-app --token "$VERCEL_TOKEN"
          echo "Step 2: Pulling env..."
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          echo "Step 3: Building..."
          npx vercel build --prod --token "$VERCEL_TOKEN"
          echo "Step 4: Deploying..."
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
