name: Diagnose Vercel deploy steps
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Step 1 — vercel link
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          npx vercel link --yes --scope wecrypto --project poker-mini-app --token "$VERCEL_TOKEN"
      - name: Step 2 — vercel pull
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
      - name: Step 3 — vercel build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          npx vercel build --prod --token "$VERCEL_TOKEN"
      - name: Step 4 — vercel deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
