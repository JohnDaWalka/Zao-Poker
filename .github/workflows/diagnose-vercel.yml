name: Diagnose Vercel deploy steps
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Test each deploy step
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd poker-mini-app
          echo "=== STEP 1: vercel link ==="
          npx vercel link --yes --scope wecrypto --project poker-mini-app --token "$VERCEL_TOKEN" || echo "LINK FAILED"
          echo ""
          echo "=== STEP 2: vercel pull ==="
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN" || echo "PULL FAILED"
          echo ""
          echo "=== STEP 3: vercel build ==="
          npx vercel build --prod --token "$VERCEL_TOKEN" || echo "BUILD FAILED"
          echo ""
          echo "=== STEP 4: vercel deploy ==="
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" || echo "DEPLOY FAILED"
